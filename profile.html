<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Shobji Hub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; }
        .profile-header { background-color: white; padding: 20px; display: flex; align-items: center; margin-bottom: 10px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; background-color: #e0e0e0; margin-right: 15px; }
        .user-name { font-size: 18px; font-weight: bold; }
        .user-phone { font-size: 14px; color: #717171; }
        .section-title { font-size: 14px; font-weight: bold; color: #8c8c8c; padding: 15px 15px 5px; }
        .list-group { background-color: white; list-style: none; padding: 0; margin: 0; }
        .list-item { padding: 15px; border-bottom: 1px solid #e0e0e0; font-size: 16px; color: #222222; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list-item:last-child { border-bottom: none; }
        .arrow { color: #bdbdbd; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 10px 0; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); }
        .nav-item { text-align: center; font-size: 12px; color: #555; text-decoration: none; display: block; }
        .nav-item img { width: 24px; height: 24px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

    <header>
        <h1>My Profile</h1>
    </header>

    <div class="profile-header">
        <div class="profile-img"></div>
        <div>
            <div class="user-name">Guest User</div>
            <div class="user-phone">8391001173</div>
        </div>
    </div>

    <div class="section-title">MY ACTIVITY</div>
    <ul class="list-group">
        <li class="list-item">
            Orders
            <span class="arrow">></span>
        </li>
        <li class="list-item">
            Your Wishlist
            <span class="arrow">></span>
        </li>
    </ul>

    <div class="section-title">YOUR INFORMATION</div>
    <ul class="list-group">
        <li class="list-item">
            Address Book
            <span class="arrow">></span>
        </li>
    </ul>

    <div class="section-title">PAYMENTS & COUPONS</div>
    <ul class="list-group">
        <li class="list-item">
            Coupons
            <span class="arrow">></span>
        </li>
        <li class="list-item">
            Payment Settings
            <span class="arrow">></span>
        </li>
    </ul>

    <div class="section-title">SUPPORT</div>
    <ul class="list-group">
        <li class="list-item">
            Help Center
            <span class="arrow">></span>
        </li>
    </ul>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
        <a href="home.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
            Home
        </a>
        <a href="#" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149852.png" alt="Search">
            Search
        </a>
        <a href="#" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/3416/3416075.png" alt="Cart">
            Cart
        </a>
        <a href="profile.html" class="nav-item">
            <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" alt="Profile">
            Profile
        </a>
    </div>

</body>
</html>
