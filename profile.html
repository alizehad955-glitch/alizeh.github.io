<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobji Hub - Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; }
        .profile-header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #ddd; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; background-color: #ccc; margin-bottom: 10px; }
        .user-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .user-phone { font-size: 14px; color: #777; }
        .section-title { font-size: 16px; font-weight: bold; margin: 20px 15px 10px; color: #555; }
        .list-group { background: white; list-style-type: none; padding: 0; margin: 0; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .list-item { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #333; }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background-color: #f9f9f9; }
        .arrow { color: #aaa; }
    </style>
</head>
<body>

    <header>
        <h1>Profile</h1>
    </header>

    <div class="profile-header">
        <div class="profile-img"></div>
        <div class="user-name">Guest User</div>
        <div class="user-phone">8391001173</div>
    </div>

    <div class="section-title">Your information</div>
    <ul class="list-group">
        <li class="list-item">Address book <span class="arrow">></span></li>
        <li class="list-item">Your wishlist <span class="arrow">></span></li>
    </ul>

    <div class="section-title">Payment and coupons</div>
    <ul class="list-group">
        <li class="list-item">Payment settings <span class="arrow">></span></li>
    </ul>

    <ul class="list-group" style="margin-top: 20px;">
        <li class="list-item" style="color: #e91e63;">Log out <span class="arrow">></span></li>
    </ul>

</body>
</html>
